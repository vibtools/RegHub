name: Production CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: production-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONHASHSEED: random

jobs:
  quality-and-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: reghub_ci
          POSTGRES_USER: reghub
          POSTGRES_PASSWORD: reghub-ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reghub -d reghub_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+asyncpg://reghub:reghub-ci-password@127.0.0.1:5432/reghub_ci
      REDIS_URL: redis://127.0.0.1:6379/0
      SESSION_SECRET: ci-session-secret-with-at-least-thirty-two-characters
      SESSION_COOKIE_SECURE: "false"
      PUBLIC_BASE_URL: http://testserver
      ALLOWED_HOSTS: '["testserver","localhost","127.0.0.1"]'
      OPERATION_BACKEND: inprocess
      CACHE_BACKEND: redis
      RATE_LIMIT_BACKEND: redis
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python scripts/retry_command.py --attempts 3 --initial-delay 3 -- python -m pip install --upgrade pip
      - run: python scripts/retry_command.py --attempts 3 --initial-delay 3 -- python -m pip install ".[dev]"
      - name: Remove package build artifacts
        run: python -c "import shutil; shutil.rmtree('build', ignore_errors=True); shutil.rmtree('dist', ignore_errors=True)"
      - run: python -m pip check
      - run: ruff check .
      - run: ruff format --check .
      - run: python -m compileall -q app scripts tests
      - run: python -m scripts.security_static_check
      - run: python -m scripts.verify_release_tree
      - run: python -m scripts.verify_file_manifest
      - run: python -m scripts.verify_production_config
      - run: python -m scripts.verify_alembic_heads
      - run: alembic upgrade head
      - run: python -m scripts.seed
      - run: pytest --cov=app --cov-report=term-missing --cov-fail-under=70
      - name: Snapshot third-party dependencies for audit
        run: python -m scripts.audit_requirements --output "$RUNNER_TEMP/reghub-audit-requirements.txt" --exclude reghub --require-present reghub
      - name: Audit third-party dependencies
        run: python -m pip_audit --strict --no-deps --disable-pip --requirement "$RUNNER_TEMP/reghub-audit-requirements.txt"

  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality-and-integration
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: reghub_docker
          POSTGRES_USER: reghub
          POSTGRES_PASSWORD: reghub-docker-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reghub -d reghub_docker"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - run: python scripts/retry_command.py --attempts 3 --initial-delay 5 -- docker pull python:3.13-slim
      - run: docker build --tag reghub-ci:${{ github.sha }} .
      - name: Verify non-root image contract
        run: test "$(docker inspect --format '{{.Config.User}}' reghub-ci:${{ github.sha }})" = "reghub"
      - name: Start hardened container
        run: |
          docker run --detach --name reghub-ci --network host \
            --read-only --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --cap-drop ALL --security-opt no-new-privileges:true \
            -e APP_ENV=test \
            -e DATABASE_URL=postgresql+asyncpg://reghub:reghub-docker-password@127.0.0.1:5432/reghub_docker \
            -e SESSION_SECRET=ci-session-secret-with-at-least-thirty-two-characters \
            -e SESSION_COOKIE_SECURE=false \
            -e PUBLIC_BASE_URL=http://127.0.0.1:8000 \
            -e ALLOWED_HOSTS='["127.0.0.1","localhost"]' \
            -e OPERATION_BACKEND=inprocess \
            reghub-ci:${{ github.sha }}
      - name: Verify container readiness
        run: |
          for attempt in $(seq 1 40); do
            if curl --fail --silent http://127.0.0.1:8000/api/v1/ready; then
              exit 0
            fi
            sleep 2
          done
          docker logs reghub-ci
          exit 1
      - if: always()
        run: docker logs reghub-ci || true
      - if: always()
        run: docker rm --force reghub-ci || true
