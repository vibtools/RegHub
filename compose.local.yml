services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: reghub
      POSTGRES_USER: reghub
      POSTGRES_PASSWORD: reghub-local-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reghub -d reghub"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - reghub_postgres:/var/lib/postgresql/data

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://reghub:reghub-local-password@postgres:5432/reghub
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  reghub_postgres:
