services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: reghub
      POSTGRES_USER: reghub
      POSTGRES_PASSWORD: reghub-local-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reghub -d reghub"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - reghub_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - reghub_redis:/data

  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://reghub:reghub-local-password@postgres:5432/reghub
      REDIS_URL: redis://redis:6379/0
      OPERATION_BACKEND: redis
      CACHE_BACKEND: redis
      RATE_LIMIT_BACKEND: redis
      TRUSTED_PROXY_NETWORKS: '["127.0.0.1/32","172.16.0.0/12"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    entrypoint: ["python", "-m", "scripts.worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://reghub:reghub-local-password@postgres:5432/reghub
      REDIS_URL: redis://redis:6379/0
      OPERATION_BACKEND: redis
      CACHE_BACKEND: redis
      RATE_LIMIT_BACKEND: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_healthy

volumes:
  reghub_postgres:
  reghub_redis:
